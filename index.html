<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎵 老歌点唱机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#6366f1;--primary-dark:#4f46e5;--accent:#f472b6;
  --bg-dark:#0a0a1a;--bg-card:rgba(255,255,255,0.05);--text:#fff
}
body{
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg-dark);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  position:relative
}

/* 动态背景 */
.bg-orbs{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none}
.orb{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;
  animation:float 8s ease-in-out infinite
}
.orb1{width:400px;height:400px;background:linear-gradient(135deg,var(--primary),var(--accent));
  top:-100px;left:-100px;animation-delay:0s}
.orb2{width:300px;height:300px;background:linear-gradient(135deg,#8b5cf6,#ec4899);
  bottom:-50px;right:-50px;animation-delay:-3s}
.orb3{width:200px;height:200px;background:linear-gradient(135deg,#06b6d4,#10b981);
  top:50%;left:50%;animation-delay:-5s}
@keyframes float{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-30px) scale(1.05)}
  66%{transform:translate(-20px,20px) scale(.95)}
}

/* 主容器 */
.container{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:20px 16px 40px}

/* 标题 */
.header{text-align:center;padding:30px 0 20px}
.header h1{
  font-size:1.8rem;font-weight:700;
  background:linear-gradient(135deg,var(--primary),var(--accent),#fcd34d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:3px
}
.header p{color:rgba(255,255,255,.5);font-size:.85rem;margin-top:6px}

/* 唱片区域 */
.vinyl-scene{
  position:relative;width:260px;height:260px;margin:20px auto;
  display:flex;align-items:center;justify-content:center
}
.vinyl-glow{
  position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(circle,var(--primary) 0%,transparent 70%);
  opacity:.3;animation:pulse 3s ease-in-out infinite
}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.5;transform:scale(1.1)}}
.vinyl{
  width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#333 0%,#111 50%,#1a1a1a 100%);
  box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 0 40px rgba(0,0,0,.3);
  animation:spin 8s linear infinite;animation-play-state:paused;
  position:relative;display:flex;align-items:center;justify-content:center;
  transition:box-shadow .5s
}
.vinyl.playing{
  animation-play-state:running;
  box-shadow:0 20px 60px rgba(99,102,241,.4),0 0 80px rgba(99,102,241,.2),inset 0 0 40px rgba(0,0,0,.3)
}
/* 唱片纹理 */
.vinyl::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:repeating-radial-gradient(circle at center,transparent 0,transparent 2px,rgba(255,255,255,.03) 2px,rgba(255,255,255,.03) 4px);
}
.vinyl-center{
  width:70px;height:70px;border-radius:50%;
  background:linear-gradient(135deg,#222,#000);
  border:3px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1
}
.vinyl-center::after{
  content:'';width:16px;height:16px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--accent))
}
/* 唱臂 */
.tonearm{
  position:absolute;top:20px;right:40px;
  width:8px;height:120px;
  background:linear-gradient(180deg,#666,#333);
  border-radius:4px;
  transform-origin:top center;
  transform:rotate(-30deg);
  transition:transform .5s ease
}
.tonearm::before{
  content:'';position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);
  width:4px;height:25px;background:#888;border-radius:2px
}
.vinyl.playing ~ .tonearm{transform:rotate(-15deg)}
@keyframes spin{to{transform:rotate(360deg)}}

/* 歌曲信息 */
.now-playing{
  text-align:center;margin:30px 0 20px;
  min-height:80px
}
.song-title{
  font-size:1.3rem;font-weight:700;margin-bottom:4px;
  background:linear-gradient(90deg,#fff,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.song-artist{font-size:.9rem;color:rgba(255,255,255,.5)}

/* 进度条 */
.progress-section{margin:24px 0}
.progress-bar{
  position:relative;height:6px;background:rgba(255,255,255,.1);border-radius:3px;cursor:pointer
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));
  border-radius:3px;width:0;transition:width .1s linear;position:relative
}
.progress-fill::after{
  content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 10px var(--accent);opacity:0;transition:opacity .2s
}
.progress-bar:hover .progress-fill::after{opacity:1}
.progress-time{
  display:flex;justify-content:space-between;margin-top:8px;
  font-size:.75rem;color:rgba(255,255,255,.4)
}

/* 控制按钮 */
.controls{display:flex;align-items:center;justify-content:center;gap:20px;margin:30px 0}
.ctrl-btn{
  background:none;border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;border-radius:50%
}
.ctrl-btn:hover{transform:scale(1.1)}
.ctrl-btn:active{transform:scale(.95)}
.btn-play{
  width:70px;height:70px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  box-shadow:0 8px 30px rgba(99,102,241,.4)
}
.btn-play svg{width:28px;height:28px;fill:#fff}
.btn-sm svg{width:24px;height:24px;fill:rgba(255,255,255,.7)}
.btn-sm:hover svg{fill:#fff}

/* 播放列表 */
.playlist{
  background:var(--bg-card);border-radius:20px;padding:8px;
  margin-top:30px;backdrop-filter:blur(10px)
}
.playlist-header{
  padding:12px 16px;font-size:.85rem;color:rgba(255,255,255,.5);
  border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:4px
}
.play-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 12px;border-radius:12px;
  cursor:pointer;transition:all .2s
}
.play-item:hover{background:rgba(255,255,255,.05)}
.play-item.active{background:linear-gradient(135deg,rgba(99,102,241,.2),rgba(244,114,182,.1))}
.play-item.active .item-num{background:var(--primary);color:#fff}
.item-num{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:600;color:rgba(255,255,255,.6);flex-shrink:0
}
.item-info{flex:1;min-width:0}
.item-title{font-size:.95rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-artist{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:2px}
.play-icon{width:20px;height:20px;opacity:0;transition:opacity .2s}
.play-item.active .play-icon{opacity:1}

/* 歌词 */
.lyrics{
  margin-top:30px;text-align:center;
  min-height:100px;padding:20px;
  background:var(--bg-card);border-radius:20px;
  backdrop-filter:blur(10px)
}
.lyric-line{
  padding:6px 0;font-size:.9rem;color:rgba(255,255,255,.35);
  transition:all .3s
}
.lyric-line.active{
  color:#fff;font-weight:600;
  text-shadow:0 0 20px var(--accent)
}

/* 底部信息 */
.footer{
  text-align:center;margin-top:40px;
  font-size:.75rem;color:rgba(255,255,255,.3)
}

@media(max-width:420px){
  .vinyl-scene{width:220px;height:220px}
  .vinyl{width:200px;height:200px}
  .vinyl-center{width:55px;height:55px}
  .tonearm{right:30px;height:100px}
}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="container">
  <div class="header">
    <h1>🎵 老歌点唱机</h1>
    <p>时髦曲，慢慢听</p>
  </div>

  <div class="vinyl-scene">
    <div class="vinyl-glow"></div>
    <div class="vinyl" id="vinyl">
      <div class="vinyl-center"></div>
    </div>
    <div class="tonearm"></div>
  </div>

  <div class="now-playing">
    <div class="song-title" id="songTitle">吴克群 - 为你写诗</div>
    <div class="song-artist" id="songArtist">吴克群</div>
  </div>

  <div class="progress-section">
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-time">
      <span id="curTime">0:00</span>
      <span id="totalTime">0:00</span>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn btn-sm" id="btnPrev" title="上一首">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
    </button>
    <button class="ctrl-btn btn-play" id="btnPlay">
      <svg viewBox="0 0 24 24" id="playIcon"><polygon points="6,4 20,12, 6,20"/></svg>
    </button>
    <button class="ctrl-btn btn-sm" id="btnNext" title="下一首">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
    </button>
  </div>

  <div class="playlist">
    <div class="playlist-header">播放列表 · <span id="songCount">2</span> 首</div>
    <div id="playlist"></div>
  </div>

  <div class="lyrics" id="lyrics">
    <div class="lyric-line">点击播放按钮开始</div>
  </div>

  <div class="footer">Made with ❤️ | 一时髦曲</div>
</div>

<audio id="audio"></audio>

<script>
const songs = [
  {
    name: "吴克群 - 为你写诗",
    artist: "吴克群",
    url: "songs/1_吴克群-为你写诗.mp3",
    lyrics: [
      "为你写诗 - 吴克群","",
      "想为你写一首诗","写下你的名字","画上你的样子","",
      "在每个想你的夜里","你的笑容 是我最大的快乐","",
      "为你写诗 为你静止","为你做不可能的事","",
      "为你写诗 为你造句","为你学会弹琴作曲","",
      "弹着琴为你唱了一夜","这一刻 世界都停止转动","",
      "为你写诗 为你静止","为你做不可能的事","",
      "为你我学会弹琴作曲","为你..."
    ]
  },
  {
    name: "凉凉",
    artist: "张碧晨 / 杨宗纬",
    url: "songs/3_凉凉.mp3",
    lyrics: [
      "凉凉 - 三生三世十里桃花 OST","",
      "入夜微微凉 天地苍茫","叶落萧声回荡","",
      "月弯弯 勾住过往","情深深 两心难忘","",
      "凉凉三生三世恍然如梦","须臾一年 我还在等","",
      "一刻一刹 都陪你等","等奇迹 也等重逢","",
      "凉凉天意 潋滟一身花色","落入凡尘伤情着","",
      "生劫易渡 情劫难了","折旧的心 还有几分","",
      "几分余温..."
    ]
  }
];

let idx = 0, playing = false;

const audio = document.getElementById("audio");
const vinyl = document.getElementById("vinyl");
const btnPlay = document.getElementById("btnPlay");
const playIcon = document.getElementById("playIcon");
const progressFill = document.getElementById("progressFill");
const progressBar = document.getElementById("progressBar");
const curTime = document.getElementById("curTime");
const totalTime = document.getElementById("totalTime");
const songTitle = document.getElementById("songTitle");
const songArtist = document.getElementById("songArtist");
const lyricsEl = document.getElementById("lyrics");
const playlistEl = document.getElementById("playlist");

function fmt(s){
  const m = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  return m + ":" + ("0" + ss).slice(-2);
}

function renderPlaylist(){
  playlistEl.innerHTML = songs.map((s, i) => `
    <div class="play-item ${i == idx ? 'active' : ''}" onclick="playSong(${i})">
      <div class="item-num">${i + 1}</div>
      <div class="item-info">
        <div class="item-title">${s.name}</div>
        <div class="item-artist">${s.artist}</div>
      </div>
      <svg class="play-icon" viewBox="0 0 24 24"><polygon points="6,4 20,12, 6,20" fill="#6366f1"/></svg>
    </div>
  `).join('');
}

function updateNowPlaying(){
  const s = songs[idx];
  songTitle.textContent = s.name;
  songArtist.textContent = s.artist;
  renderPlaylist();
}

function playSong(i){
  idx = i;
  const s = songs[idx];
  audio.src = s.url;
  audio.load();
  audio.play().then(() => {
    playing = true;
    vinyl.classList.add("playing");
    playIcon.innerHTML = '<rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/>';
  }).catch(e => {
    lyricsEl.innerHTML = '<div class="lyric-line">⚠️ 点击播放按钮</div>';
  });
  updateNowPlaying();
}

function togglePlay(){
  if(playing){
    audio.pause();
    playing = false;
    vinyl.classList.remove("playing");
    playIcon.innerHTML = '<polygon points="6,4 20,12, 6,20"/>';
  } else {
    if(!audio.src){
      playSong(idx);
    } else {
      audio.play();
      playing = true;
      vinyl.classList.add("playing");
      playIcon.innerHTML = '<rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/>';
    }
  }
}

function updateLyrics(time){
  const s = songs[idx];
  if(!s.lyrics) return;
  
  const lines = s.lyrics;
  // 简单按时间分配，每行约3秒
  const lineDuration = 3;
  const lineIdx = Math.min(Math.floor(time / lineDuration), lines.length - 1);
  
  lyricsEl.innerHTML = lines.map((l, i) => {
    return `<div class="lyric-line ${i === lineIdx ? 'active' : ''}">${l}</div>`;
  }).join('');
  
  // 滚动到当前行
  const active = lyricsEl.querySelector('.active');
  if(active){
    active.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

audio.addEventListener("timeupdate", () => {
  if(audio.duration){
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + "%";
    curTime.textContent = fmt(audio.currentTime);
    updateLyrics(audio.currentTime);
  }
});

audio.addEventListener("loadedmetadata", () => {
  totalTime.textContent = fmt(audio.duration);
});

audio.addEventListener("ended", () => {
  // 播完自动播放下一首
  idx = (idx + 1) % songs.length;
  playSong(idx);
});

progressBar.addEventListener("click", (e) => {
  if(audio.duration){
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  }
});

btnPlay.addEventListener("click", togglePlay);
document.getElementById("btnPrev").addEventListener("click", () => {
  playSong((idx - 1 + songs.length) % songs.length);
});
document.getElementById("btnNext").addEventListener("click", () => {
  playSong((idx + 1) % songs.length);
});

// 初始化
document.getElementById("songCount").textContent = songs.length;
updateNowPlaying();
</script>
</body>
</html>
