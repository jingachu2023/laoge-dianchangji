<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎵 老歌点唱机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px}
h1{font-size:1.5rem;margin:20px 0 6px;letter-spacing:2px;text-align:center}
.sub{color:rgba(255,255,255,.55);font-size:.85rem;margin-bottom:20px;text-align:center}

/* 唱片动画 */
.vinyl-wrap{position:relative;width:220px;height:220px;margin:10px auto 28px}
.vinyl{
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,#222 38%,#444 40%,#222 42%,#333 60%,#222 62%,#444 80%,#222 82%);
  box-shadow:0 0 40px rgba(99,102,241,.45);
  animation:spin 4s linear infinite;
  animation-play-state:paused;
  display:flex;align-items:center;justify-content:center}
.vinyl.playing{animation-play-state:running}
.vinyl-inner{
  width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle,#666,#222);
  border:3px solid #888;display:flex;align-items:center;justify-content:center}
.vinyl-inner::after{content:'';width:12px;height:12px;border-radius:50%;background:#aaa}
@keyframes spin{to{transform:rotate(360deg)}}

/* 歌曲列表 */
.song-list{width:100%;max-width:380px}
.song-item{
  display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,.07);border-radius:14px;
  padding:14px 16px;margin-bottom:12px;cursor:pointer;
  transition:background .2s,border-color .2s;
  border:2px solid transparent}
.song-item:hover,.song-item.active{
  background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.6)}
.song-num{
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;
  font-size:.95rem;font-weight:700;color:rgba(255,255,255,.6);flex-shrink:0}
.song-item.active .song-num{background:rgba(99,102,241,.8);color:#fff}
.song-info{flex:1;min-width:0}
.song-name{font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-artist{font-size:.78rem;color:rgba(255,255,255,.5);margin-top:2px}
.song-dur{font-size:.75rem;color:rgba(255,255,255,.4);flex-shrink:0}

/* 控制栏 */
.controls{
  width:100%;max-width:380px;margin-top:24px;
  display:flex;flex-direction:column;gap:14px;align-items:center}
.progress-wrap{width:100%;display:flex;align-items:center;gap:10px}
.progress-wrap span{font-size:.75rem;color:rgba(255,255,255,.5);min-width:40px;text-align:center}
input[type=range]{
  flex:1;-webkit-appearance:none;height:4px;border-radius:4px;
  background:rgba(255,255,255,.18);outline:none}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:#818cf8;border:2px solid #fff;cursor:pointer}
.btns{display:flex;align-items:center;gap:28px}
.btn{
  background:none;border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s}
.btn:active{transform:scale(.9)}
.btn-play{width:60px;height:60px;border-radius:50%;background:rgba(99,102,241,.8)}
.btn-play svg{fill:#fff;width:26px;height:26px;margin-left:3px}
.btn-sm svg{fill:rgba(255,255,255,.7);width:22px;height:22px}
.btn-sm{opacity:.7;transition:opacity .2s}
.btn-sm:hover,.btn-sm.active{opacity:1}

/* 歌词 */
.lyrics{
  margin-top:20px;width:100%;max-width:380px;
  max-height:120px;overflow-y:auto;text-align:center;
  font-size:.85rem;line-height:1.8;color:rgba(255,255,255,.45);
  scroll-behavior:smooth}
.lyrics .active{color:#818cf8;font-weight:600}
.lyrics::-webkit-scrollbar{width:0}

/* 循环提示 */
.loop-hint{
  margin-top:10px;font-size:.75rem;color:rgba(129,140,248,.7);
  min-height:1.2em;text-align:center}

@media(max-width:420px){
  .vinyl-wrap{width:180px;height:180px}
  .vinyl{width:180px;height:180px}
}
</style>
</head>
<body>

<h1>🎵 老歌点唱机</h1>
<p class="sub">一时髦曲，慢慢听</p>

<div class="vinyl-wrap">
  <div class="vinyl" id="vinyl">
    <div class="vinyl-inner"></div>
  </div>
</div>

<div class="song-list" id="list"></div>

<div class="controls">
  <div class="progress-wrap">
    <span id="cur">0:00</span>
    <input type="range" id="progress" min="0" max="100" value="0">
    <span id="total">0:00</span>
  </div>
  <div class="btns">
    <button class="btn btn-sm" id="btnPrev" title="上一首">⏮</button>
    <button class="btn btn-play" id="btnPlay">
      <svg viewBox="0 0 24 24"><polygon points="6,4 20,12, 6,20"/></svg>
    </button>
    <button class="btn btn-sm" id="btnNext" title="下一首">⏭</button>
    <button class="btn btn-sm" id="btnLoop" title="循环模式">🔁</button>
  </div>
</div>

<div class="lyrics" id="lyrics">点击歌曲开始播放 🎶</div>
<div class="loop-hint" id="loopHint">循环：单曲</div>

<audio id="audio"></audio>

<script>
const songs = [
  {
    name: "吴克群 - 为你写诗",
    artist: "吴克群",
    url: "songs/1_吴克群-为你写诗.mp3",
    lyrics: [
      "为你写诗 - 吴克群","","想为你写一首诗","写下你的名字","画上你的样子","","在每个想你的夜里","你的笑容 是我最大的快乐","","为你写诗 为你静止","为你做不可能的事","","为你写诗 为你造句","为你......"
    ]
  },
  {
    name: "凉凉",
    artist: "张碧晨 / 杨宗纬",
    url: "songs/3_凉凉.mp3",
    lyrics: [
      "凉凉 - 三生三世十里桃花","","入梦前 晨雨渺渺","寒山寺 能听钟声","","怎么 你却不在身旁","","怕鬼魅 也怕人","更怕 你不在身旁","","凉凉 三生三世恍然如梦","一刻一刹 都陪你等"
    ]
  }
];

let idx = 0, loopMode = 1; // 0=不循环 1=单曲 2=列表
const audio = document.getElementById("audio");
const vinyl = document.getElementById("vinyl");
const listEl = document.getElementById("list");
const lyricsEl = document.getElementById("lyrics");
const progress = document.getElementById("progress");
const curEl = document.getElementById("cur");
const totalEl = document.getElementById("total");
const btnPlay = document.getElementById("btnPlay");
const loopHint = document.getElementById("loopHint");

function fmt(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return m+":"+("0"+ss).slice(-2)}

function renderList(){
  listEl.innerHTML="";
  songs.forEach((s,i)=>{
    const d=document.createElement("div");
    d.className="song-item"+(i==idx?" active":"");
    d.innerHTML=`<div class="song-num">${i+1}</div><div class="song-info"><div class="song-name">${s.name}</div><div class="song-artist">${s.artist||''}</div></div>`;
    d.onclick=()=>{idx=i;load();play()};
    listEl.appendChild(d)
  })
}
function load(){
  const s=songs[idx];
  renderList();
  if(s.url){audio.src=s.url;audio.load()}
  else {audio.removeAttribute("src");lyricsEl.innerHTML="暂不可用"}
  totalEl.textContent=s.url?fmt(0):"--:--";
  curEl.textContent="0:00";
  progress.value=0;
  vinyl.classList.remove("playing");
  btnPlay.innerHTML='<svg viewBox="0 0 24 24"><polygon points="6,4 20,12, 6,20"/></svg>'
}
function play(){
  const s=songs[idx];
  if(!s.url){lyricsEl.innerHTML="此歌曲暂不可用";return}
  audio.play().catch(e=>{
    lyricsEl.innerHTML="⚠️ 无法播放，请检查文件是否存在";
    console.error(e);
  });
  vinyl.classList.add("playing");
  btnPlay.innerHTML='<svg viewBox="0 0 24 24"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>'
}
function pause(){audio.pause();vinyl.classList.remove("playing");btnPlay.innerHTML='<svg viewBox="0 0 24 24"><polygon points="6,4 20,12, 6,20"/></svg>'}

// 歌词高亮（简单时间匹配）
function highlightLyrics(time){
  const lines=songs[idx].lyrics;
  if(!lines)return;
  // 简单按时间分配高亮行
  const lineIdx=Math.min(Math.floor(time/5),lines.length-1);
  let html=lines.map((l,i)=>`<div class="${i===lineIdx?'active':''}">${l}</div>`).join('');
  lyricsEl.innerHTML=html;
  // 滚动到当前行
  const active=lyricsEl.querySelector('.active');
  if(active)active.scrollIntoView({block:'center',behavior:'smooth'})
}

audio.ontimeupdate=()=>{
  if(!audio.duration)return;
  progress.value=audio.currentTime/audio.duration*100;
  curEl.textContent=fmt(audio.currentTime);
  highlightLyrics(audio.currentTime)
};
audio.onloadedmetadata=>{totalEl.textContent=fmt(audio.duration)};
audio.onended=()=>{
  if(loopMode===1){audio.currentTime=0;play()}
  else if(loopMode===2){idx=(idx+1)%songs.length;load();play()}
  else pause()
};
progress.oninput=()=>{if(audio.duration){audio.currentTime=progress.value/100*audio.duration}};

btnPlay.onclick=()=>{audio.paused?play():pause()};
document.getElementById("btnNext").onclick=()=>{idx=(idx+1)%songs.length;load();play()};
document.getElementById("btnPrev").onclick=()=>{idx=(idx-1+songs.length)%songs.length;load();play()};
document.getElementById("btnLoop").onclick=()=>{
  loopMode=(loopMode+1)%3;
  document.getElementById("btnLoop").className="btn btn-sm"+(loopMode?" active":"");
  loopHint.textContent=["循环：关闭","循环：单曲","循环：列表"][loopMode]
};

renderList();
</script>
</body>
</html>
